name: FootballPulse Daily Predictions

on:
  schedule:
    # Tous les jours à 8h UTC (9h Paris, 9h Casablanca)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate Daily Predictions
        run: |
          echo "Generating daily predictions..."
          
          response=$(curl -s -w "\n%{http_code}" \
            --max-time 300 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"adminPassword\":\"${{ secrets.ADMIN_PASSWORD }}\",\"count\":5}" \
            "${{ secrets.SITE_URL }}/api/predictions")
          
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          
          echo "Status: $http_code"
          echo "Response: $body"