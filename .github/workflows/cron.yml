name: FootballPulse Auto Publish

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Article Generation
        run: |
          echo "Triggering FootballPulse cron..."
          
          response=$(curl -s -w "\n%{http_code}" \
            --max-time 300 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/cron")
          
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          
          echo "Status: $http_code"
          echo "Response: $body"