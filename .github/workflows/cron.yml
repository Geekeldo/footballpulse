name: FootballPulse Auto Publish

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  generate-article:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Generate Article
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            --max-time 55 \
            --retry 0 \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/cron")
          
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          
          echo "Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Success"
          else
            echo "⚠️ Status $http_code — non-blocking"
          fi
